    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }
    /* Galaxy nebula + milky way band */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        /* Main milky way band - diagonal streak from top-left to bottom-right */
        linear-gradient(145deg,
          transparent 15%,
          rgba(80,60,140,0.08) 22%,
          rgba(100,80,180,0.18) 28%,
          rgba(140,100,200,0.25) 33%,
          rgba(180,150,220,0.18) 38%,
          rgba(120,100,200,0.22) 42%,
          rgba(160,120,210,0.15) 48%,
          rgba(100,80,180,0.10) 55%,
          transparent 65%
        ),
        /* Milky way glow - soft white core */
        linear-gradient(145deg,
          transparent 20%,
          rgba(200,200,240,0.06) 28%,
          rgba(220,210,255,0.12) 34%,
          rgba(240,230,255,0.08) 40%,
          rgba(200,200,240,0.10) 46%,
          rgba(220,210,255,0.05) 52%,
          transparent 60%
        ),
        /* Surrounding nebula clouds */
        radial-gradient(ellipse 100% 50% at 10% 15%, rgba(100,50,170,0.28) 0%, transparent 45%),
        radial-gradient(ellipse 80% 40% at 90% 70%, rgba(120,50,150,0.22) 0%, transparent 40%),

        radial-gradient(ellipse 60% 30% at 30% 80%, rgba(60,90,190,0.15) 0%, transparent 35%);
      pointer-events: none;
      z-index: 0;
    }
    /* Star field - denser along the milky way band */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        /* Bright stars scattered */
        radial-gradient(2px 2px at 32% 30%, rgba(255,255,255,0.9), transparent),
        radial-gradient(2.2px 2.2px at 38% 35%, rgba(240,230,255,0.85), transparent),

        radial-gradient(1.8px 1.8px at 50% 30%, rgba(255,255,255,0.75), transparent),

        radial-gradient(1.2px 1.2px at 28% 34%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.2px 1.2px at 44% 40%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1.2px 1.2px at 52% 26%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.2px 1.2px at 34% 48%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1.2px 1.2px at 46% 22%, rgba(255,255,255,0.5), transparent),
        /* Scattered stars away from band */
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.2px 1.2px at 85% 45%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1.5px 1.5px at 95% 10%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 15% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 75% 90%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.2px 1.2px at 70% 20%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.2px 1.2px at 3% 40%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 92% 55%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 65% 10%, rgba(255,255,255,0.4), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== Twinkling Stars ===== */
    .twinkle-star {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: twinkle 2.2s ease-in-out forwards;
    }
    .twinkle-star svg {
      display: block;
      filter: drop-shadow(0 0 4px currentColor);
    }
    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(0.2) rotate(0deg); }
      30%  { opacity: 1; transform: scale(1.1) rotate(15deg); }
      50%  { opacity: 0.7; transform: scale(0.9) rotate(-10deg); }
      70%  { opacity: 1; transform: scale(1.05) rotate(5deg); }
      100% { opacity: 0; transform: scale(0.15) rotate(0deg); }
    }

    /* ===== Cofit Logo ===== */
    .brand-logo {
      position: relative;
      z-index: 2;
      margin-bottom: 8px;
      opacity: 0.75;
      transition: opacity 0.3s;
    }
    .brand-logo:hover {
      opacity: 1;
    }
    .brand-logo img {
      height: 32px;
      width: auto;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    /* ===== Page Containers ===== */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 40px 20px 60px;
      opacity: 0;
      transition: opacity 0.45s ease;
    }
    .page.active {
      display: flex;
      position: relative;
      z-index: 1;
    }
    .page.visible {
      opacity: 1;
    }

    /* ===== Typography ===== */
    .title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-align: center;
      background: linear-gradient(135deg, #e8d0ff 0%, #ffffff 30%, #c8d8ff 55%, #f0d0ff 80%, #d0e8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(160,130,255,0.35));
    }
    .subtitle {
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(200,210,240,0.6);
      margin-bottom: 32px;
      text-align: center;
    }
    .subtitle::before {
      content: '✦ ';
      font-size: 10px;
      vertical-align: 1px;
    }
    .subtitle::after {
      content: ' ✦';
      font-size: 10px;
      vertical-align: 1px;
    }
    .selection-count {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 20px;
      min-height: 20px;
      transition: color 0.3s;
    }
    .selection-count.ready {
      color: rgba(255,255,255,0.8);
    }

    /* ===== Color Grid (Page 1) ===== */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 36px;
    }
    .color-cell {
      aspect-ratio: 1;
      border-radius: 10px;
      cursor: pointer;
      transition: box-shadow 0.25s ease, transform 0.2s ease;
      position: relative;
    }
    @media (hover: hover) {
      .color-cell:hover {
        box-shadow: 0 0 16px rgba(255,255,255,0.25);
        transform: scale(1.08);
        z-index: 1;
      }
    }
    .color-cell:active {
      transform: scale(0.95);
    }
    .color-cell.selected {
      box-shadow: 0 0 0 3px #ffffff, 0 0 20px rgba(255,255,255,0.35);
      transform: scale(1.06);
      z-index: 2;
    }

    /* ===== CTA Buttons ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 48px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #a88baf, #7b9cb8);
      color: #fff;
    }
    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }
    .btn-primary:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(168,139,175,0.4);
    }
    .btn-outline {
      background: transparent;
      color: #f0f0f0;
      border: 1.5px solid rgba(255,255,255,0.35);
    }
    .btn-outline:hover {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.06);
    }

    /* ===== Result Page ===== */
    .result-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 28px;
      text-align: center;
      background: linear-gradient(135deg, #e8d0ff 0%, #ffffff 30%, #c8d8ff 55%, #f0d0ff 80%, #d0e8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(160,130,255,0.35));
    }

    /* Venn Circles */
    .venn-container {
      position: relative;
      width: 280px;
      height: 250px;
      margin-bottom: 28px;
    }
    .circle {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      animation: fadeInUp 0.6s ease forwards;
    }
    .circle:nth-child(1) {
      top: 0; left: 50%; transform: translateX(-50%);
      animation-delay: 0s;
    }
    .circle:nth-child(2) {
      bottom: 0; left: 5%;
      animation-delay: 0.18s;
    }
    .circle:nth-child(3) {
      bottom: 0; right: 5%;
      animation-delay: 0.36s;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 0.72; }
    }
    .circle:nth-child(1) {
      animation-name: fadeInUpCenter;
    }
    @keyframes fadeInUpCenter {
      from { opacity: 0; top: 24px; left: 50%; transform: translateX(-50%); }
      to   { opacity: 0.72; top: 0; left: 50%; transform: translateX(-50%); }
    }

    /* Description */
    .description {
      max-width: 480px;
      font-size: 15px;
      line-height: 1.75;
      color: rgba(255,255,255,0.82);
      text-align: center;
      margin-bottom: 28px;
      padding: 0 8px;
    }

    /* Info Boxes */
    .info-boxes {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 36px;
    }
    .info-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px 16px;
    }
    .info-box-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(200,210,240,0.7);
      letter-spacing: 1px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
      margin: -18px -16px 12px -16px;
      padding: 14px 16px 10px;
      border-radius: 14px 14px 0 0;
    }
    .info-box-content {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.88);
    }
    .info-box-item {
      margin-bottom: 8px;
    }
    .info-box-item:last-child {
      margin-bottom: 0;
    }
    .info-box-item .item-name {
      color: rgba(200,180,255,0.9);
      font-weight: 600;
    }
    .info-box-item .item-desc {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
    }

    /* Result CTA */
    .result-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .result-buttons .btn {
      min-width: 140px;
    }

    .btn-restart {
      margin-top: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.3s;
    }
    .btn-restart:hover {
      color: rgba(255,255,255,0.55);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      padding: 10px 28px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* ===== Responsive ===== */
    @media (max-width: 420px) {
      .page { padding: 28px 14px 48px; }
      .title { font-size: 22px; }
      .color-grid { gap: 6px; max-width: 340px; }
      .venn-container { width: 240px; height: 215px; }
      .circle { width: 125px; height: 125px; font-size: 12px; }
    }
    @media (max-width: 340px) {
      .color-grid { gap: 4px; max-width: 300px; }
      .circle { width: 110px; height: 110px; }
      .venn-container { width: 210px; height: 190px; }
    }
  </style>
</head>

// ===== State =====
let selectedIndices = [];
let isSharedView = false;

// ===== DOM Elements =====
const pageSelect  = document.getElementById('page-select');
const pageResult  = document.getElementById('page-result');
const colorGrid   = document.getElementById('colorGrid');
const selCount    = document.getElementById('selectionCount');
const btnConfirm  = document.getElementById('btnConfirm');
const btnShare    = document.getElementById('btnShare');
const btnRestart  = document.getElementById('btnRestart');
const toastEl     = document.getElementById('toast');

// ===== Render Color Grid =====
COLORS.forEach((c, i) => {
  const cell = document.createElement('div');
  cell.className = 'color-cell';
  cell.style.backgroundColor = c.hex;
  cell.dataset.index = i;
  cell.addEventListener('click', () => toggleColor(i, cell));
  colorGrid.appendChild(cell);
});

// ===== Selection Logic =====
function toggleColor(index, cell) {
  const pos = selectedIndices.indexOf(index);
  if (pos !== -1) {
    // Deselect
    selectedIndices.splice(pos, 1);
    cell.classList.remove('selected');
  } else if (selectedIndices.length < 3) {
    // Select
    selectedIndices.push(index);
    cell.classList.add('selected');
  }
  updateSelectionUI();
}

function updateSelectionUI() {
  const n = selectedIndices.length;
  selCount.textContent = n > 0 ? `已選 ${n} / 3` : '';
  selCount.classList.toggle('ready', n === 3);
  btnConfirm.disabled = n !== 3;
}

// ===== Page Transitions =====
function showPage(show, hide) {
  hide.classList.remove('visible');
  setTimeout(() => {
    hide.classList.remove('active');
    show.classList.add('active');
    // Force reflow so the transition works
    show.offsetHeight;
    show.classList.add('visible');
    window.scrollTo(0, 0);
  }, 460);
}

// ===== Result Rendering =====
function renderResult() {
  const colors = selectedIndices.map(i => COLORS[i]);

  // Venn circles
  colors.forEach((c, i) => {
    const el = document.getElementById('circle' + i);
    el.style.backgroundColor = c.hex;
    el.textContent = c.name;
    // Reset animation
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });

  // Description — varied templates to avoid repetition
  const descTemplates = [
    `你被「${colors[0].energy}」、「${colors[1].energy}」與「${colors[2].energy}」的能量所吸引。這代表你的內在正渴望一種深層的修復與重整，身體也在悄悄發出需要被關注的訊號。`,
    `「${colors[0].energy}」、「${colors[1].energy}」與「${colors[2].energy}」交織出你此刻的能量圖譜。你的身心正處於轉變的階段，適時補充對的養分，能幫助你更快找回最佳狀態。`,
    `你選擇了「${colors[0].energy}」、「${colors[1].energy}」和「${colors[2].energy}」，這三股能量揭示了你目前最需要被照顧的面向。聆聽身體的聲音，給自己一份由內而外的滋養吧。`,
    `「${colors[0].energy}」、「${colors[1].energy}」、「${colors[2].energy}」——這是你的潛意識正在呼喚的力量。當這些能量不足時，身體往往會透過各種小訊號來提醒你，是時候好好補充了。`,
  ];
  const descIndex = (selectedIndices[0] + selectedIndices[1] + selectedIndices[2]) % descTemplates.length;
  document.getElementById('resultDesc').textContent = descTemplates[descIndex];

  // Life pain points (each color has a unique sentence)
  const lackEl = document.getElementById('boxLack');
  lackEl.innerHTML = colors.map(c => `• ${c.lack}`).join('<br>');

  // Supplements (deduplicated by name, keep desc)
  const seen = new Set();
  const supps = [];
  colors.forEach(c => {
    c.supplements.forEach(s => {
      if (!seen.has(s.name)) { seen.add(s.name); supps.push(s); }
    });
  });
  document.getElementById('boxSupplement').innerHTML = supps
    .map(s => `<div class="info-box-item">• <span class="item-name">${s.name}</span><br><span class="item-desc">${s.desc}</span></div>`)
    .join('');
}

// ===== Share =====
btnShare.addEventListener('click', () => {
  const params = selectedIndices.join(',');
  const url = `${location.origin}${location.pathname}?c=${params}`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => showToast('已複製連結！'));
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已複製連結！');
  }
});

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ===== Confirm Button =====
btnConfirm.addEventListener('click', () => {
  if (selectedIndices.length !== 3) return;
  renderResult();
  showPage(pageResult, pageSelect);
  btnRestart.style.display = 'block';
});

// ===== Restart =====
btnRestart.addEventListener('click', () => {
  history.replaceState(null, '', location.pathname);
  selectedIndices = [];
  // Clear grid selections
  colorGrid.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
  updateSelectionUI();
  showPage(pageSelect, pageResult);
  btnRestart.style.display = 'none';
});

// ===== Check Shared Link on Load =====
(function checkSharedLink() {
  const params = new URLSearchParams(location.search);
  const c = params.get('c');
  if (c) {
    const indices = c.split(',').map(Number);
    if (indices.length === 3 && indices.every(i => Number.isInteger(i) && i >= 0 && i < 36)) {
      selectedIndices = indices;
      isSharedView = true;
      renderResult();
      // Show result directly
      pageSelect.classList.remove('active', 'visible');
      pageResult.classList.add('active');
      requestAnimationFrame(() => {
        pageResult.classList.add('visible');
      });
      btnRestart.style.display = 'block';
    }
  }
})();

// ===== Twinkling Stars Animation =====
const starColors = [
  'rgba(255,255,255,0.9)',
  'rgba(200,210,255,0.85)',
  'rgba(255,220,200,0.8)',
  'rgba(220,200,255,0.85)',
  'rgba(200,255,240,0.8)',
  'rgba(255,240,200,0.8)',
  'rgba(180,200,255,0.85)',
];

function createTwinkleStar() {
  const star = document.createElement('div');
  star.className = 'twinkle-star';
  const x = Math.random() * 100;
  const y = Math.random() * 100;
  const size = 10 + Math.random() * 14;
  const color = starColors[Math.floor(Math.random() * starColors.length)];
  star.style.left = x + '%';
  star.style.top = y + '%';
  star.style.color = color;
  // Sharp 4-pointed star SVG
  star.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 0 L13.5 9.5 L24 12 L13.5 14.5 L12 24 L10.5 14.5 L0 12 L10.5 9.5 Z"/>
  </svg>`;
  document.body.appendChild(star);
  star.addEventListener('animationend', () => star.remove());
}

// Create stars at staggered intervals — roughly every 3 seconds, 2-3 stars each burst
setInterval(() => {
  const count = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < count; i++) {
    setTimeout(createTwinkleStar, Math.random() * 800);
  }
}, 3000);
// Initial burst
for (let i = 0; i < 3; i++) {
  setTimeout(createTwinkleStar, 500 + Math.random() * 1500);
}
